<!DOCTYPE html>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<html lang="en">
<!--<script type="text/javascript" src="search-code.js"></script>-->
<head>
    <title>Jegesmedve09's Website</title>
    <style>
        @font-face {
            font-family: "Quick Cat";
            src: url("../font/QuickCat.ttf");
        }

        @font-face {
            font-family: "Roboto Regular";
            src: url("../font/RobotoRegular.ttf");
        }
    </style>
</head>

<body bgcolor="#8080FF">
    <div class="top_interface" id="top_interface">
        <style>
            .logo {
                width: 60px;
                height: 60px;
                position: fixed;
                top: 5px;
                left: 5px;
            }


            .top_background {
                background: #FFFFFF;
                width: 100%;
                height: 70px;
                position: fixed;
                top: 0px;
                left: 0px;
            }

            .top_bottom {
                position: fixed;
                background: #000000;
                width: 100%;
                height: 1px;
                left: 0px;
                top: 70px;
            }

            .title {
                font-family: "Quick Cat";
                position: fixed;
                top: 0px;
                left: 80px;
                color: #0094ff;
            }
        </style>
        <background class="top_background" id="top_background" />
        <a href="../index.html">
            <img src="../assets/logo.gif" class="logo" id="logo" />
            <h1 class="title">My Poems</h1>
        </a>
        <bottom class="top_bottom" id="top_bottom" />
    </div>



    <style>
        .navigation_info {
            position: fixed;
            left: 20px;
            top: 60px;
            font-size: 30px;
            font-family: 'Quick Cat';
        }
    </style>
    <a href="../index.html">
        <p class="navigation_info">< Back</p>
    </a>


    <div class="page" id="page">
        <style>
            .page {
                margin-top: 140px; /*140px;*/
                position: page;
                display: grid;
                grid-template-columns: 1fr 1fr 1fr 1fr;
                column-gap: 10px;
                row-gap: 20px;
                justify-items: center;
            }

            .item_background {
                width: 300px;
                height: 300px;
                background: #FFFFFF;
                border-radius: 50px;
            }

            .item {
                text-align: center;
            }

            .item_title {
                font-family: Roboto Regular;
            }

            .item_image {
                border-radius: 50px;
            }

            a:link {
                color: #000000;
                text-decoration: none;
            }

            a:visited {
                color: #000000;
                text-decoration: none;
            }

            a:hover {
                color: #2020FF;
                text-decoration: none;
            }
        </style>
        <div class="item">
            <div class="item_background">
                <a href="disgrace.html">
                    <img class="item_image" src="../assets/poems.png" />
                    <br />
                    <h1 class="item_title">Disgrace (DARK)</h1>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
